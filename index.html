<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Scanner App</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }
        body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Container untuk kamera */
        #camera-view {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Menyesuaikan layar tanpa merusak rasio */
        }
        
        /* Kotak Panduan Scan (Scanner Guide) */
        #scan-guide {
            position: absolute;
            width: 85%;
            height: 250px;
            border: 2px solid #007BFF;
            border-radius: 16px;
            /* Membuat area di luar kotak menjadi gelap */
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6);
            z-index: 5;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        #scan-guide::before {
            content: "Arahkan tulisan ke dalam kotak ini";
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 0 0 10px 10px;
            font-size: 14px;
        }

        /* Area kontrol di bagian bawah */
        #controls {
            height: 120px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-bottom: 20px;
            z-index: 10;
        }
        /* Tombol Jepret */
        #capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: transparent;
            border: 4px solid #fff;
            position: relative;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #capture-btn::after {
            content: '';
            width: 54px;
            height: 54px;
            background-color: #fff;
            border-radius: 50%;
            transition: all 0.2s;
        }
        #capture-btn:active::after {
            background-color: #ccc;
            transform: scale(0.9);
        }
        
        /* Overlay Loading */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
