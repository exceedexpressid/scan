<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag ini mencegah user melakukan zoom agar terasa seperti aplikasi native -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Scanner App</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }
        body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Container untuk kamera penuh */
        #camera-view {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Area kontrol di bagian bawah */
        #controls {
            height: 120px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-bottom: 20px;
        }
        /* Tombol Jepret (Shutter) ala Android */
        #capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: transparent;
            border: 4px solid #fff;
            position: relative;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #capture-btn::after {
            content: '';
            width: 54px;
            height: 54px;
            background-color: #fff;
            border-radius: 50%;
            transition: all 0.2s;
        }
        #capture-btn:active::after {
            background-color: #ccc;
            transform: scale(0.9);
        }
        /* Overlay Loading */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Panel Hasil Scan (Bottom Sheet style) */
        #result-panel {
            position: absolute;
            bottom: -100%; /* Sembunyi di bawah */
            left: 0;
            width: 100%;
            height: 60vh;
            background-color: #fff;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            transition: bottom 0.3s ease-in-out;
            z-index: 20;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        #result-panel.active {
            bottom: 0; /* Muncul ke atas */
        }
        #result-panel h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }
        #result-text {
            flex-grow: 1;
            overflow-y: auto;
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 12px;
            white-space: pre-wrap;
            color: #444;
            font-size: 14px;
            line-height: 1.5;
        }
        #close-btn {
            margin-top: 15px;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            text-align: center;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Area Kamera -->
    <div id="camera-view">
        <video id="video" autoplay playsinline></video>
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p>Memproses teks...</p>
        </div>
    </div>

    <!-- Area Tombol -->
    <div id="controls">
        <div id="capture-btn"></div>
    </div>

    <!-- Canvas tersembunyi untuk mengambil gambar dari video -->
    <canvas id="canvas" style="display: none;"></canvas>

    <!-- Panel Hasil -->
    <div id="result-panel">
        <h3>Hasil Scan</h3>
        <div id="result-text"></div>
        <div id="close-btn">Scan Lagi</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const resultPanel = document.getElementById('result-panel');
        const resultText = document.getElementById('result-text');
        const closeBtn = document.getElementById('close-btn');

        // Fungsi untuk menyalakan kamera belakang
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } // Prioritaskan kamera belakang
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Tidak dapat mengakses kamera. Pastikan izin diberikan.");
                console.error(err);
            }
        }

        // Mulai kamera saat halaman dimuat
        startCamera();

        // Ketika tombol jepret ditekan
        captureBtn.addEventListener('click', () => {
            // Sesuaikan ukuran canvas dengan resolusi video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Gambar *frame* video saat ini ke dalam canvas
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Ubah gambar di canvas menjadi data format base64 (JPEG)
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            // Tampilkan loading
            loadingOverlay.style.display = 'flex';

            // Jalankan Tesseract.js
            Tesseract.recognize(
                imageData,
                'ind+eng',
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                loadingOverlay.style.display = 'none'; // Sembunyikan loading
                
                if(text.trim() === "") {
                    resultText.innerText = "Tidak ada teks yang terdeteksi.";
                } else {
                    resultText.innerText = text;
                }
                
                // Munculkan panel hasil dari bawah
                resultPanel.classList.add('active');
            }).catch(err => {
                loadingOverlay.style.display = 'none';
                alert("Gagal memproses gambar.");
                console.error(err);
            });
        });

        // Tombol untuk menutup hasil dan kembali scan
        closeBtn.addEventListener('click', () => {
            resultPanel.classList.remove('active');
        });
    </script>
</body>
</html>
